rowDetailsHtml=rowDetailsHtmlV12;

sampleBody=function(insp,p,prof){ensureV12Inspection(insp);const s=(p.samples||[]).find(x=>x.id===route.sampleId)||ensureRowSample(p);route.sampleId=s.id;const cs=computeSample(s,prof);setTimeout(()=>loadSamplePhotos(insp.id,p.id,s.id),0);if(route.newRow)focusNewRowPallet();const tagOpts=PHOTO_TYPES.map(x=>`<option value="${x[1]}">${x[1]}</option>`).join(""),rows=defectRowsV11(insp,p,s,prof,cs);return `<div class="row-actions"><button class="linkbtn" style="flex:1;text-align:left" onclick='go({view:"inspection",id:"${insp.id}",tab:"pallets"})'>← All rows</button><button class="linkbtn" onclick='addPallet("${insp.id}")'>+ New row</button></div><div class="resume-note">Everything saves offline while you type.</div>${rowDetailsHtmlV12(insp,p)}<div class="samplebar"><div class="sums" id="sample-sums">Qual ${fmt(cs.sumQ)}% · Cond ${fmt(cs.sumC)}%</div>${statusPill(rowStatus(p,prof))}</div><div class="evidence-card"><div class="evidence-head"><div><strong>Photo evidence</strong><span>Photos can be relabeled and reordered inside this row.</span></div></div><div class="field"><label>Next photo type</label><select id="photo-tag">${tagOpts}</select></div><div class="row-actions"><button class="btn btn-primary btn-sm" style="flex:1" onclick='triggerPhoto("sample-photo-cam")'>📷 Take photo</button><button class="btn btn-ghost btn-sm" style="flex:1" onclick='triggerPhoto("sample-photo-gal")'>Library</button></div><input type="file" id="sample-photo-cam" accept="image/*" capture="environment" style="display:none" onchange='handlePhoto("${insp.id}","${p.id}",this,"${s.id}")'><input type="file" id="sample-photo-gal" accept="image/*" multiple style="display:none" onchange='handlePhoto("${insp.id}","${p.id}",this,"${s.id}")'><div class="photo-save-help">Use Share on a photo, then choose Save Image on iPhone. The fallback opens a full-size image for press-and-hold saving.</div><div class="photo-mini-grid" id="sample-photo-grid"></div></div><div class="card"><div class="field" style="margin-bottom:0"><label>Sample size (fruit inspected)</label><input id="sample-size-input" type="number" inputmode="numeric" value="${esc(s.size)}" onfocus="this.select()" oninput='setSize("${insp.id}","${p.id}","${s.id}",this.value)'></div><div id="assignment-meter-live">${assignmentMeter(s,prof)}</div></div>${cutSampleCard(insp,p)}<div class="section-note">Use − / + for small changes, or tap the center number and type the count. Counts are limited so the same fruit cannot be assigned to more than one primary defect.</div><div class="defect-group-title">Inspection counts</div>${rows}${manualGradePicker(insp,p)}${completionCard(insp,p)}<div class="box-button-row"><button class="btn btn-ghost btn-block" onclick='addSecondBoxFromRow("${insp.id}","${p.id}")'>+ Box 2 from same pallet</button><button class="btn btn-primary btn-block" onclick='addPallet("${insp.id}")'>+ New pallet / row</button></div><button class="btn btn-danger btn-block" style="margin-top:10px" onclick='deleteRowWithUndo("${insp.id}","${p.id}")'>Delete inspection row</button>`;};

function reportBodyV12(insp){ensureV12Inspection(insp);const m=insp.meta,r=computeInspection(insp);setTimeout(()=>{loadReportPhotos(insp);loadReportDocuments(insp);},0);const rankList=(items,total)=>items.map(it=>`<div class="rank-row"><span class="rname">${esc(it.name)}</span><span class="rpct">${fmt(it.pct)}%</span></div>`).join("")+`<div class="rank-row total"><span class="rname">TOTAL</span><span class="rpct">${fmt(total)}%</span></div>`;const gradeSummary=insp.gradingEnabled?(()=>{const counts=Object.fromEntries(MANUAL_GRADES.map(g=>[g.code,{rows:0,cases:0}]));(insp.pallets||[]).forEach(p=>{if(counts[p.manualGrade]){counts[p.manualGrade].rows++;counts[p.manualGrade].cases+=Number(p.cases)||0;}});return `<h2 style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)">Manual grade summary</h2><table class="rt"><tr><th>Grade</th><th class="num">Cases</th><th class="num">Boxes</th></tr>${MANUAL_GRADES.map(g=>`<tr><td><span class="grade-letter">${g.code}</span> ${esc(g.label)}</td><td class="num">${counts[g.code].cases}</td><td class="num">${counts[g.code].rows}</td></tr>`).join("")}</table>`})():'<div class="report-grade-off"><strong>Grading is off.</strong> Defect percentages are shown, but no automatic final grade is assigned.</div>';const detail=r.pallets.map(({p,c},ix)=>{const pack=(insp.packagingGroups||[]).find(g=>g.id===p.packagingGroupId),cut=p.cutSample||{};return `<tr><td>${esc(p.label||('Row '+(ix+1)))}</td><td>${esc(p.exporter||"")}</td><td>${esc(p.variety||"")}</td><td>${esc(p.grower||"")}</td><td>${esc(packagingLabel(pack)||p.package||"")}</td><td class="num">${esc(p.size||"")}</td><td class="num">${esc(p.cases||0)}</td><td class="num">${fmt(c.avgQ)}</td><td class="num">${fmt(c.avgC)}</td><td>${insp.gradingEnabled?(p.manualGrade?`<span class="grade-letter">${esc(p.manualGrade)}</span>`:'—'):statusPill(rowStatus(p,r.prof))}</td><td class="report-cut-note">${cut.completed?([cut.internal,cut.taste,cut.texture,cut.remarks].filter(Boolean).map(esc).join(' · ')||'Completed'):'Not completed'}</td></tr>`;}).join("");const tempFmt=(arr,group)=>arr.map((t,ix)=>{const hf=String(t.f??"").trim()!=="",hc=String(t.c??"").trim()!=="";if(!hf&&!hc)return"";return `${esc(t.label||defaultTempLabel(group,ix))}: ${hf?fmt(Number(t.f),1)+'°F':'—'} / ${hc?fmt(Number(t.c),1)+'°C':'—'}`;}).filter(Boolean).join(" · "),pulp=tempFmt(insp.pulpTemps,"pulp"),ambient=tempFmt(insp.ambientTemps,"ambient");return reviewCard(insp)+`<div class="report"><div class="report-head"><div class="rtitle">${esc(m.type||"Inspection Report")}</div><div class="rsub">QCapp · generated ${new Date().toLocaleDateString()}</div></div><div class="meta-grid"><div><div class="k">Inspection covers</div><div class="v">${insp.inspectionKind==='container'?'One container load':'One shipper’s breakbulk lot'}</div></div><div><div class="k">Variety</div><div class="v">${esc(m.specie||'—')}</div></div><div><div class="k">Vessel / Shipper</div><div class="v">${esc(m.vessel||'—')}</div></div><div><div class="k">Container / Lot</div><div class="v">${esc(m.container||'—')}</div></div><div><div class="k">Warehouse</div><div class="v">${esc(m.warehouse||'—')}</div></div><div><div class="k">Inspection date</div><div class="v">${esc(m.date||'—')}</div></div><div><div class="k">Manifest / reference</div><div class="v">${esc(m.documentRef||m.did||'—')}</div></div></div>${pulp?`<div class="temps-inline"><strong>Pulp temps:</strong> ${pulp}</div>`:''}${ambient?`<div class="temps-inline"><strong>Ambient temps:</strong> ${ambient}</div>`:''}${gradeSummary}<h2 style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)">Quality defect ranking</h2>${r.rank.quality.length?rankList(r.rank.quality,r.sumQ):'<div class="section-note">None recorded.</div>'}<h2 style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:18px">Condition defect ranking</h2>${r.rank.condition.length?rankList(r.rank.condition,r.sumC):'<div class="section-note">None recorded.</div>'}<h2 style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:18px">Inspection row detail</h2><div class="scroll-x"><table class="rt"><tr><th>Pallet / box</th><th>Exporter</th><th>Variety</th><th>Grower</th><th>Packaging</th><th class="num">Size</th><th class="num">Cases</th><th class="num">Qual %</th><th class="num">Cond %</th><th>${insp.gradingEnabled?'Grade':'Status'}</th><th>Cut sample</th></tr>${detail||'<tr><td colspan="11">No rows.</td></tr>'}</table></div>${m.notes?`<h2 style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:18px">Notes</h2><div style="font-size:14px;white-space:pre-wrap">${esc(m.notes)}</div>`:''}<div id="report-documents"></div><div id="report-photos"></div></div><div class="card no-print"><h2>Export</h2><div class="section-note">Print / PDF uses the phone’s built-in print dialog. Photos follow the order set inside each inspection row.</div><button class="btn btn-ghost btn-block" onclick="window.print()">Download PDF report</button></div>`;}
reportBody=reportBodyV12;

renderInspection=function(){const insp=getInsp(route.id);if(!insp){go({view:"home"});return;}ensureV12Inspection(insp);const m=insp.meta,tab=route.tab||"details";let body=tab==="details"?detailsBody(insp):tab==="pallets"?palletsBody(insp):reportBody(insp);const tabs=["details","pallets","report"].map(t=>{const target=tabTarget(insp,t);return `<button class="tab ${t===tab?'on':''}" onclick='go(${JSON.stringify(target)})'>${t}</button>`;}).join("");const right=`<span class="save-state" id="autosave-status">Saved offline</span>${tab==='report'?'<button class="iconbtn" onclick="window.print()">Print / PDF</button>':''}`;$app().innerHTML=topbar(m.container||m.specie||"New inspection",m.type||"Inspection",{view:"home"},right)+`<div class="screen tabbed">${body}</div><div class="tabs">${tabs}</div>`;};

const renderSettingsBeforeV12=renderSettings;
renderSettings=function(){renderSettingsBeforeV12();if(route.commodityId)return;const screen=document.querySelector(".screen");if(!screen)return;const cards=Array.from(screen.querySelectorAll(".card"));const camera=cards.find(c=>c.textContent.includes("Camera photo saving"));if(camera)camera.innerHTML=`<h2>Camera photo saving</h2><label class="settings-toggle"><input type="checkbox" ${store.promptPhotoSave?'checked':''} onchange="setPhotoSavePrompt(this.checked)"><div><strong>Open Share / Save after camera capture</strong><span>QCapp opens the native share sheet when iPhone allows it. Choose Save Image. If sharing is blocked, the photo opens full size for press-and-hold saving.</span></div></label>`;const note=screen.querySelector(".section-note");if(note&&note.textContent.includes("QCapp v"))note.textContent=note.textContent.replace(/QCapp v[\d.]+/,"QCapp v12.0");};


window.addEventListener("pagehide",flushCurrentInput);
window.addEventListener("beforeunload",flushCurrentInput);
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="hidden")flushCurrentInput();});
migrateWorkflowV9();
migrateWorkflowV10();
migrateWorkflowV11();
migrateWorkflowV12();
render();
</script>
</body>
</html>
